<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<link rel="icon" type="image/png" href="logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRC TCG</title>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; border: none; }
    body { font-family: 'Righteous', sans-serif; background: #eeeeee; height: 100vh; width: 100vw; overflow: hidden; }

    #splash { position: fixed; inset: 0; background: #eeeeee; display: flex; align-items: center; justify-content: center; z-index: 999; transition: opacity 1s ease; }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    #splash img { width: clamp(160px, 40vw, 260px); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }

    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
    .screen.visible { opacity: 1; pointer-events: all; }

    .screen-header { height: 18vh; display: flex; align-items: center; justify-content: center; }
    .screen-header h1 { font-size: clamp(48px, 12vw, 72px); color: #ff8a80; }

    .tray { background: #82b1ff; border: 10px solid #448aff; border-radius: 40px; margin: 0 auto; width: 90%; max-width: 460px; padding: 35px 30px 30px; display: flex; flex-direction: column; gap: 14px; }
    .tray-title { font-size: 32px; color: white; text-align: center; margin-bottom: 4px; }

    input { width: 100%; padding: 14px 18px; border-radius: 16px; font-family: 'Righteous', sans-serif; font-size: 16px; background: white; color: #333; }
    input::placeholder { color: #aaa; }

    .btn-main { background: #ff80ab; color: white; font-family: 'Righteous', sans-serif; font-size: 22px; padding: 16px; border-radius: 20px; cursor: pointer; box-shadow: 0 5px 0 #c2185b; text-align: center; transition: all 0.15s; margin-top: 4px; }
    .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #c2185b; }

    .error-box { background: white; color: #ff4444; border-radius: 12px; padding: 10px 14px; font-size: 13px; text-align: center; display: none; }

    .screen-footer { height: 12vh; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 15px; color: #888; }
    .screen-footer span { color: #448aff; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>

  <div id="splash"><img src="logo.png" alt="FRC TCG"></div>

  <div id="loginScreen" class="screen">
    <div class="screen-header"><h1>FRC TCG</h1></div>
    <div class="tray">
      <div class="tray-title">LOGIN</div>
      <input type="text" id="loginUsername" placeholder="Username" autocomplete="off" />
      <input type="password" id="loginPassword" placeholder="Password" />
      <div class="error-box" id="loginError"></div>
      <div class="btn-main" id="loginBtn" onclick="handleLogin()">LET'S GO →</div>
    </div>
    <div class="screen-footer">Don't have an account? <span onclick="showScreen('signupScreen')">Sign Up</span></div>
  </div>

  <div id="signupScreen" class="screen">
    <div class="screen-header"><h1>FRC TCG</h1></div>
    <div class="tray">
      <div class="tray-title">SIGN UP</div>
      <input type="text" id="signupFirstName" placeholder="First Name" autocomplete="off" />
      <input type="text" id="signupUsername" placeholder="Username (letters, numbers, _)" autocomplete="off" />
      <input type="number" id="signupTeam" placeholder="FRC Team Number" autocomplete="off" min="1" max="99999" />
      <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" />
      <div class="error-box" id="signupError"></div>
      <div class="btn-main" id="signupBtn" onclick="handleSignup()">CREATE ACCOUNT →</div>
    </div>
    <div class="screen-footer">Already have an account? <span onclick="showScreen('loginScreen')">Log In</span></div>
  </div>

  <script type="module">
    import { db } from './firebase-config.js';
    import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    async function hashPassword(password) {
      const data = new TextEncoder().encode(password + 'frctcg-salt-2026');
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    // Splash always plays first, then redirect if logged in
    const alreadyLoggedIn = !!sessionStorage.getItem('frctcg_user');

    setTimeout(() => {
      const splash = document.getElementById('splash');
      splash.classList.add('fade-out');
      setTimeout(() => {
        splash.style.display = 'none';
        if (alreadyLoggedIn) {
          window.location.href = 'app.html';
        } else {
          showScreen('loginScreen');
        }
      }, 1000);
    }, 7000);

    window.showScreen = function(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('visible'));
      document.getElementById(id).classList.add('visible');
    };

    window.handleLogin = async function() {
      const username = document.getElementById('loginUsername').value.trim().toLowerCase();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      errorEl.style.display = 'none';

      if (!username || !password) { errorEl.innerText = 'Please fill in all fields!'; errorEl.style.display = 'block'; return; }

      btn.innerText = 'Loading...'; btn.style.pointerEvents = 'none';
      try {
        const snap = await getDoc(doc(db, 'users', username));
        if (!snap.exists()) { errorEl.innerText = 'Username not found!'; errorEl.style.display = 'block'; btn.innerText = "LET'S GO →"; btn.style.pointerEvents = 'auto'; return; }
        const user = snap.data();
        const hash = await hashPassword(password);
        if (hash !== user.passwordHash) { errorEl.innerText = 'Wrong password!'; errorEl.style.display = 'block'; btn.innerText = "LET'S GO →"; btn.style.pointerEvents = 'auto'; return; }
        sessionStorage.setItem('frctcg_user', JSON.stringify({ username, firstName: user.firstName, teamNumber: user.teamNumber || null }));
        window.location.href = 'app.html';
      } catch (err) {
        errorEl.innerText = 'Connection error. Try again!'; errorEl.style.display = 'block';
        btn.innerText = "LET'S GO →"; btn.style.pointerEvents = 'auto';
      }
    };

    window.handleSignup = async function() {
      const firstName = document.getElementById('signupFirstName').value.trim();
      const username = document.getElementById('signupUsername').value.trim().toLowerCase();
      const password = document.getElementById('signupPassword').value;
      const errorEl = document.getElementById('signupError');
      const btn = document.getElementById('signupBtn');
      errorEl.style.display = 'none';

      const teamRaw = document.getElementById('signupTeam').value.trim();
      const teamNumber = parseInt(teamRaw);
      if (!firstName || !username || !password || !teamRaw) { errorEl.innerText = 'Please fill in all fields!'; errorEl.style.display = 'block'; return; }
      if (isNaN(teamNumber) || teamNumber < 1 || teamNumber > 99999) { errorEl.innerText = 'Enter a valid FRC team number!'; errorEl.style.display = 'block'; return; }
      if (username.length < 3) { errorEl.innerText = 'Username must be at least 3 characters!'; errorEl.style.display = 'block'; return; }
      if (password.length < 6) { errorEl.innerText = 'Password must be at least 6 characters!'; errorEl.style.display = 'block'; return; }
      if (!/^[a-z0-9_]+$/.test(username)) { errorEl.innerText = 'Username: letters, numbers, underscores only!'; errorEl.style.display = 'block'; return; }

      btn.innerText = 'Creating...'; btn.style.pointerEvents = 'none';
      try {
        const existing = await getDoc(doc(db, 'users', username));
        if (existing.exists()) { errorEl.innerText = 'Username already taken!'; errorEl.style.display = 'block'; btn.innerText = 'CREATE ACCOUNT →'; btn.style.pointerEvents = 'auto'; return; }
        const passwordHash = await hashPassword(password);
        await setDoc(doc(db, 'users', username), { firstName, username, passwordHash, teamNumber, firstWin: false, createdAt: new Date().toISOString() });
        sessionStorage.setItem('frctcg_user', JSON.stringify({ username, firstName }));
        window.location.href = 'app.html';
      } catch (err) {
        errorEl.innerText = 'Connection error. Try again!'; errorEl.style.display = 'block';
        btn.innerText = 'CREATE ACCOUNT →'; btn.style.pointerEvents = 'auto';
      }
    };
  </script>
</body>
</html>
